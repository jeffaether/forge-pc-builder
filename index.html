<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE — Custom Gaming PCs, Taiwan-Built</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f2;
  --surface:#ffffff;
  --surface2:#f0f0ee;
  --surface3:#e7e7e4;
  --border:rgba(20,20,18,0.10);
  --border-hover:rgba(20,20,18,0.22);
  --accent:#b3431c;
  --accent-glow:rgba(179,67,28,0.10);
  --accent-light:#c75426;
  --accent-dark:#8c3315;
  --text:#161614;
  --text-muted:#5c5c58;
  --text-dim:#94948f;
  --green:#1c7d4d;
  --gold:#9a6b15;
  --blue:#1d5fc9;
  --red:#c4321f;
  --shadow-sm:0 1px 2px rgba(20,20,18,0.06),0 1px 1px rgba(20,20,18,0.04);
  --shadow-md:0 6px 20px rgba(20,20,18,0.08),0 2px 6px rgba(20,20,18,0.05);
  --shadow-lg:0 20px 50px rgba(20,20,18,0.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);position:relative;z-index:10}
.body{display:flex;flex:1;overflow:hidden}
.build-summary{flex:1;overflow-y:auto;background:var(--bg);padding:24px 28px;display:flex;flex-direction:column;gap:0}
.build-summary::-webkit-scrollbar{width:5px}
.build-summary::-webkit-scrollbar-thumb{background:rgba(20,20,18,0.14);border-radius:3px}
.panel{width:424px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}

/* ── BUILD SUMMARY ── */
.sum-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.sum-title{font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.sum-price{font-size:42px;font-weight:700;letter-spacing:-2px;color:var(--text);line-height:1}
.sum-tier{margin-top:8px}
.sum-parts{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--border);margin-bottom:16px}
.sum-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--surface);transition:background .15s}
.sum-row:hover{background:var(--surface2)}
.sum-row-empty{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg);opacity:.6;cursor:pointer}
.sum-row-empty:hover{opacity:1;background:var(--surface2)}
.sum-cat{font-size:9.5px;font-weight:700;letter-spacing:.8px;color:var(--text-dim);width:80px;flex-shrink:0;text-transform:uppercase}
.sum-img{width:44px;height:36px;object-fit:contain;border-radius:6px;background:radial-gradient(circle,#dcdce2,#c4c4cc);flex-shrink:0;padding:3px}
.sum-name{font-size:12.5px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-brand{font-size:11px;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sum-price-col{text-align:right;flex-shrink:0}
.sum-part-price{font-size:13px;font-weight:700;color:var(--text)}
.sum-buy-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:4px 9px;border-radius:5px;background:#ff9900;color:#111;text-decoration:none;border:none;cursor:pointer;margin-top:4px;transition:opacity .15s;white-space:nowrap}
.sum-buy-btn:hover{opacity:.85}
.sum-empty-label{font-size:12px;color:var(--text-dim);flex:1}
.sum-add-btn{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0}
.sum-compat{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;background:var(--surface)}
.sum-buy-all{border-radius:12px;padding:20px;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:space-between;gap:16px}
.sum-buy-all-price{font-size:28px;font-weight:700;letter-spacing:-1px}
.sum-buy-all-sub{font-size:11px;opacity:.55;margin-top:2px}
.sum-buy-all-btn{padding:12px 22px;background:#ff9900;color:#111;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.sum-buy-all-btn:hover{opacity:.9}

/* ── HEADER ── */
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:30px;height:30px;border-radius:7px;background:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:15px;height:15px;fill:none;stroke:var(--bg)}
.logo-name{font-size:17px;font-weight:700;letter-spacing:1.5px;color:var(--text)}
.logo-tag{font-size:10px;color:var(--text-dim);letter-spacing:.8px;margin-top:2px;font-weight:500}
.steps{display:flex;align-items:center;gap:0;position:absolute;left:50%;transform:translateX(-50%)}
.step{display:flex;align-items:center;gap:7px;padding:6px 16px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--text-dim);cursor:default;white-space:nowrap}
.step.active{color:var(--text);background:var(--surface2)}
.step.done{color:var(--green)}
.step-num{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.step-line{width:24px;height:1px;background:var(--border)}
.header-right{display:flex;align-items:center;gap:10px}
.compat-badge{font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:7px;background:rgba(28,125,77,0.08);color:var(--green);border:1px solid rgba(28,125,77,0.22)}

/* ── VIEWER OVERLAYS ── */
.vov{position:absolute;pointer-events:none}
.vov-tl{top:16px;left:16px}
.vov-tr{top:16px;right:16px;text-align:right}
.vov-bc{bottom:16px;left:50%;transform:translateX(-50%)}
.glass-card{background:rgba(255,255,255,0.9);border:1px solid var(--border);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow-md);backdrop-filter:blur(6px)}
.vov-label{font-size:9.5px;letter-spacing:1.4px;color:var(--text-dim);margin-bottom:4px;font-weight:700;text-transform:uppercase}
.vov-val{font-size:12px;color:var(--text);font-weight:500}
.vov-price{font-size:23px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.vov-score{font-size:15px;font-weight:700}
.slot-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.slot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .4s,box-shadow .4s}
.slot-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:155px;transition:color .3s}
.hint-pill{background:rgba(255,255,255,0.9);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:500;color:var(--text-muted);box-shadow:var(--shadow-sm)}
.rgb-strip{display:flex;gap:4px;margin-top:8px}
.rgb-dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.8s ease-in-out infinite}
.rgb-dot:nth-child(2){animation-delay:.3s}
.rgb-dot:nth-child(3){animation-delay:.6s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── RIGHT PANEL ── */
.panel-presets{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.preset-chip{padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.preset-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.preset-chip.titan{border-color:rgba(179,67,28,0.4);color:var(--accent);background:var(--accent-glow)}
.panel-cats{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;background:var(--surface)}
.panel-cats::-webkit-scrollbar{display:none}
.cat-tab{padding:12px 14px;font-size:12.5px;font-weight:600;color:var(--text-dim);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;position:relative}
.cat-tab:hover{color:var(--text-muted)}
.cat-tab.sel{color:var(--text);border-bottom-color:var(--accent)}
.cat-tab.dn{color:var(--green)}
.cat-tab .ck{width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;top:9px;right:6px}
.comp-list{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:9px;background:var(--bg)}
.comp-list::-webkit-scrollbar{width:5px}
.comp-list::-webkit-scrollbar-track{background:transparent}
.comp-list::-webkit-scrollbar-thumb{background:rgba(20,20,18,0.16);border-radius:3px}
.comp-card{border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;background:var(--surface);transition:all .15s;position:relative;box-shadow:var(--shadow-sm)}
.comp-card:hover{border-color:var(--border-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.comp-card.pk{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 1px var(--accent),var(--shadow-md)}
.comp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
.comp-name{font-size:13.5px;font-weight:700;color:var(--text);line-height:1.35}
.comp-brand{font-size:11px;color:var(--text-dim);margin-top:2px;font-weight:500}
.comp-right{text-align:right;flex-shrink:0}
.comp-price{font-size:16.5px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.tier-badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:0.5px;margin-top:4px;text-transform:uppercase}
.tTitan{background:rgba(179,67,28,0.10);color:var(--accent);border:1px solid rgba(179,67,28,0.3)}
.tUltra{background:rgba(29,95,201,0.08);color:var(--blue);border:1px solid rgba(29,95,201,0.25)}
.tHigh{background:rgba(28,125,77,0.08);color:var(--green);border:1px solid rgba(28,125,77,0.22)}
.tMid{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
.tElite{background:rgba(154,107,21,0.10);color:var(--gold);border:1px solid rgba(154,107,21,0.28)}
.spec-pills{display:flex;flex-wrap:wrap;gap:5px}
.spec-pill{font-size:10px;padding:4px 9px;border-radius:6px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);font-weight:500}
.sel-pill{background:rgba(179,67,28,0.10);color:var(--accent);border-color:rgba(179,67,28,0.3)}
.panel-footer{padding:16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.footer-row{display:flex;align-items:center;justify-content:space-between}
.footer-price-label{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1.2px;margin-bottom:3px;text-transform:uppercase}
.footer-price{font-size:27px;font-weight:700;color:var(--text);letter-spacing:-1px}
.btn-primary{padding:11px 24px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:7px}
.btn-primary:hover{background:var(--accent)}
.btn-primary:disabled{opacity:0.3;cursor:default;background:var(--text)}
.btn-ghost{padding:10px 17px;background:var(--surface);color:var(--text-muted);border:1px solid var(--border-hover);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.parts-done{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-dim);margin-top:10px;font-weight:500}
.parts-pips{display:flex;gap:3px}
.parts-pip{width:18px;height:3px;border-radius:2px;transition:background .3s}

/* ── PERF PAGE ── */
#perf-page{display:none;flex-direction:column;height:100%;overflow-y:auto;padding:28px;background:var(--bg)}
#perf-page::-webkit-scrollbar{width:5px}
#perf-page::-webkit-scrollbar-thumb{background:rgba(20,20,18,0.16);border-radius:3px}
.perf-hero{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.perf-score-block{display:flex;align-items:baseline;gap:10px}
.perf-big-num{font-size:76px;font-weight:700;letter-spacing:-4px;line-height:1}
.perf-tier-tag{font-size:13px;font-weight:700;padding:6px 15px;border-radius:8px}
.perf-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:10px}
.perf-stat{text-align:left}
.perf-stat-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:3px;font-weight:700;text-transform:uppercase}
.perf-stat-val{font-size:13.5px;font-weight:600;color:var(--text)}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.game-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.game-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.game-banner{width:100%;height:130px;display:block}
.game-body{padding:13px 15px}
.game-name{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:2px}
.game-genre{font-size:11px;color:var(--text-dim);margin-bottom:11px;font-weight:500}
.game-fps-row{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.game-fps-item{flex:1;padding:9px 6px;text-align:center;border-right:1px solid var(--border)}
.game-fps-item:last-child{border-right:none}
.game-fps-res{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:.5px;margin-bottom:3px}
.game-fps-num{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.game-fps-label{font-size:9px;font-weight:600;margin-top:2px}
.game-rating{margin-top:8px}
.rating-pill{font-size:10px;padding:4px 11px;border-radius:7px;font-weight:700}
.perf-footer{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}

/* ── ANIMATIONS ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.comp-card{animation:fadeInUp .25s ease both}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="square"><path d="M5 19V5h8.5a4 4 0 0 1 0 8H9M9 13l6 6"/></svg>
    </div>
    <div>
      <div class="logo-name">FORGE</div>
      <div class="logo-tag">DESIGNED IN CALIFORNIA · MADE IN TAIWAN</div>
    </div>
  </div>
  <div class="steps">
    <div class="step active" id="step1"><span class="step-num">1</span>Configure</div>
    <div class="step-line"></div>
    <div class="step" id="step2"><span class="step-num">2</span>Benchmark</div>
    <div class="step-line"></div>
    <div class="step" id="step3"><span class="step-num">3</span>Order</div>
  </div>
  <div class="header-right">
    <div class="compat-badge" id="compat-badge" style="display:none">✓ Compatible</div>
    <button class="btn-ghost" onclick="sendToOrder()" id="hdr-order-btn" style="display:none">Order Build →</button>
  </div>
</header>

<div class="body">

<!-- BUILD SUMMARY -->
<div class="build-summary" id="build-summary">
  <!-- rendered by renderBuildSummary() -->
</div>

<!-- RIGHT PANEL: Build phase -->
<div class="panel" id="build-panel">
  <div class="panel-presets">
    <span style="font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:1px">QUICK BUILD</span>
    <button class="preset-chip" onclick="loadPreset('mid')">Mid Perf · $1,599</button>
    <button class="preset-chip" onclick="loadPreset('high')">High Perf · $2,599</button>
    <button class="preset-chip titan" onclick="loadPreset('titan')">★ Titan · $4,999</button>
    <button class="preset-chip" onclick="clearBuild()" style="margin-left:auto;opacity:.6">Clear</button>
  </div>
  <div class="panel-cats" id="cat-tabs"></div>
  <div class="comp-list" id="comp-list"></div>
  <div class="panel-footer">
    <div class="footer-row">
      <div>
        <div class="footer-price-label">TOTAL PRICE</div>
        <div class="footer-price" id="total-price">$0</div>
      </div>
      <button class="btn-primary" id="btn-bench" disabled onclick="showBench()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Benchmark
      </button>
    </div>
    <div class="parts-done" style="margin-top:10px">
      <div class="parts-pips" id="parts-pips"></div>
      <span id="parts-label">0 of 8 components selected</span>
    </div>
    <div id="compat-strip" style="display:none;margin-top:12px;padding-top:4px;border-top:1px solid var(--border)"></div>
  </div>
</div>

<!-- RIGHT PANEL: Perf phase -->
<div id="perf-page" style="display:none;flex:1;overflow:hidden">
  <div style="display:flex;flex-direction:column;height:100%;overflow-y:auto;padding:28px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <button class="btn-ghost" onclick="hideBench()" style="font-size:11px">← Back to build</button>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" onclick="alert('Exporting PDF...')">Export PDF</button>
        <button class="btn-primary" onclick="alert('Opening order form...')">Order This Build →</button>
      </div>
    </div>
    <!-- Score hero -->
    <div style="border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;background:var(--surface2)">
      <div style="font-size:10px;color:var(--text-dim);letter-spacing:1.5px;margin-bottom:6px">PERFORMANCE SCORE</div>
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:16px">
        <div class="perf-big-num" id="perf-big-num">—</div>
        <div id="perf-tier-tag"></div>
      </div>
      <div id="perf-stat-row" style="display:flex;gap:24px;flex-wrap:wrap"></div>
    </div>
    <!-- Game grid -->
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;font-weight:600;margin-bottom:12px">GAME PERFORMANCE — MAX SETTINGS · RAY TRACING ON</div>
    <div class="game-grid" id="game-grid"></div>
  </div>
</div>

</div><!-- /body -->
</div><!-- /app -->

<script>
// ============================================================
//  DATA
// ============================================================
const CATS=[
  {id:'gpu',   label:'GPU'},
  {id:'cpu',   label:'CPU'},
  {id:'mobo',  label:'Motherboard'},
  {id:'ram',   label:'RAM'},
  {id:'storage',label:'Storage'},
  {id:'cooling',label:'Cooling'},
  {id:'case',  label:'Case'},
  {id:'psu',   label:'PSU'},
];
// Real product photos sourced from Wikimedia Commons (CC-licensed, direct-linkable via Special:FilePath)
function wimg(file,w=500){return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}?width=${w}`;}
const IMG={
  gpuNV:wimg('Asus Strix RTX 4090 operational corner view.jpg'),
  gpuAMD:wimg('Sapphire AMD radeon rx 7900 xtx.JPG'),
  cpuAMD:wimg('AMD Ryzen 9 5900X by BugWarp 03.jpg'),
  cpuIntel:wimg('Intel i9-14900K.webp'),
  ram:wimg('DDR5 SDRAM (with scale) IMGP6298 smial wp.jpg'),
  ssd:wimg('Samsung 980 PRO PCIe 4.0 NVMe SSD 1TB-top PNr°0915.jpg'),
  cooling:wimg('Cooler Master ML240P series 20190601.jpg'),
  case:wimg('Lian Li O11 Dynamic XL 20190601.jpg'),
  psu:wimg('ATX Computer power supply unit.jpg'),
};
// Affiliate tag — replace with your Amazon Associates tag
const AMZN_TAG='forgepc-20';
function amzn(q){return`https://www.amazon.com/s?k=${encodeURIComponent(q)}&tag=${AMZN_TAG}`;}

const COMPS={
  gpu:[

let curCat='gpu',picks={},gpuScore=0;

function getScore(){
  const g=picks.gpu,c=picks.cpu,r=picks.ram,s=picks.storage,co=picks.cooling;
  gpuScore=g?g.score:0;
  return Math.round((gpuScore*(c?c.score/10:1))+((r?r.score:0)+(s?s.score:0)+(co?co.score:0))*0.4);
}
function tierOf(sc){
  if(sc>=95)return{l:'TITAN RIG',bg:'rgba(179,67,28,0.10)',c:'#b3431c',border:'rgba(179,67,28,0.3)'};
  if(sc>=75)return{l:'ULTRA RIG',bg:'rgba(29,95,201,0.08)',c:'#1d5fc9',border:'rgba(29,95,201,0.25)'};
  if(sc>=55)return{l:'HIGH-PERF RIG',bg:'rgba(28,125,77,0.08)',c:'#1c7d4d',border:'rgba(28,125,77,0.22)'};
  return{l:'MID-RANGE RIG',bg:'rgba(154,107,21,0.10)',c:'#9a6b15',border:'rgba(154,107,21,0.28)'};
}
function fpsOf(game,res){
  const ti=gpuScore>=95?3:gpuScore>=78?2:gpuScore>=62?1:0;
  return(res==='1080p'?game.fps1080:res==='1440p'?game.fps1440:game.fps4k)[ti];
}
function fpsStyle(fps){
  if(fps>=144)return{color:'#1c7d4d',label:'Buttery'};
  if(fps>=100)return{color:'#1d5fc9',label:'Ultra'};
  if(fps>=60)return{color:'#b3431c',label:'Smooth'};
  if(fps>=30)return{color:'#9a6b15',label:'Playable'};
  return{color:'#c4321f',label:'Choppy'};
}
function checkCompat(){
  const issues=[];
  const {cpu,mobo,ram,gpu,cooling,case:cas,psu}=picks;
  if(cpu&&mobo&&cpu.socket!==mobo.socket)
    issues.push({cat:['cpu','mobo'],sev:'error',msg:`CPU socket ${cpu.socket} ≠ motherboard socket ${mobo.socket}`});
  if(mobo&&ram&&!mobo.ramTypes.includes(ram.type))
    issues.push({cat:['mobo','ram'],sev:'error',msg:`Motherboard only supports ${mobo.ramTypes.join('/')} — RAM is ${ram.type}`});
  if(mobo&&cas&&!cas.formFactors.includes(mobo.formFactor))
    issues.push({cat:['mobo','case'],sev:'error',msg:`${mobo.formFactor} motherboard doesn't fit in this case (supports ${cas.formFactors.join('/')})`});
  if(cpu&&cooling&&!cooling.sockets.includes(cpu.socket))
    issues.push({cat:['cpu','cooling'],sev:'error',msg:`Cooler doesn't support ${cpu.socket} socket`});
  if(gpu&&cas){
    if(gpu.length_mm>cas.max_gpu_mm)
      issues.push({cat:['gpu','case'],sev:'error',msg:`GPU is ${gpu.length_mm}mm — case max is ${cas.max_gpu_mm}mm (won't fit)`});
  }
  if(cooling&&cas){
    if(cooling.rad_mm&&cooling.rad_mm>cas.max_rad_mm)
      issues.push({cat:['cooling','case'],sev:'error',msg:`${cooling.rad_mm}mm radiator won't fit — case max is ${cas.max_rad_mm}mm`});
    if(cooling.height_mm&&cooling.height_mm>cas.max_cooler_mm)
      issues.push({cat:['cooling','case'],sev:'error',msg:`Cooler is ${cooling.height_mm}mm tall — case clears ${cas.max_cooler_mm}mm max`});
  }
  if(gpu&&cpu&&psu){
    const needed=gpu.watts+cpu.watts+100;
    if(psu.watts<needed)
      issues.push({cat:['psu'],sev:'error',msg:`PSU is ${psu.watts}W — system needs ~${needed}W (GPU+CPU+100W overhead)`});
    else if(psu.watts<needed*1.2)
      issues.push({cat:['psu'],sev:'warn',msg:`PSU headroom is tight: ${psu.watts}W for ~${needed}W system (recommend ${Math.ceil(needed*1.2/50)*50}W+)`});
  }
  return issues;
}
function compatWarningsFor(cat){
  return checkCompat().filter(i=>i.cat.includes(cat));
}
function loadPreset(k){const p=PRESETS[k];Object.keys(p).forEach(cat=>{picks[cat]=COMPS[cat].find(c=>c.id===p[cat])});renderAll();}
function clearBuild(){picks={};renderAll();}
function setCat(c){curCat=c;renderTabs();renderList();}
function pick(cat,id){
  picks[cat]=COMPS[cat].find(c=>c.id===id);
  renderAll();
  const next=CATS.find(c=>!picks[c.id]);
  if(next)setTimeout(()=>setCat(next.id),120);
}
function renderTabs(){
  document.getElementById('cat-tabs').innerHTML=CATS.map(c=>`
    <button class="cat-tab ${curCat===c.id?'sel':''} ${picks[c.id]?'dn':''}" onclick="setCat('${c.id}')">
      ${c.label}${picks[c.id]?'<span class="ck"></span>':''}
    </button>`).join('');
}
function renderList(){
  const savedPick=picks[curCat];
  document.getElementById('comp-list').innerHTML=COMPS[curCat].map((c,i)=>{
    const pk=savedPick&&savedPick.id===c.id;
    // Simulate picking this card to preview its compat issues
    picks[curCat]=c;
    const issues=compatWarningsFor(curCat);
    picks[curCat]=savedPick;
    const hasError=issues.some(x=>x.sev==='error');
    const hasWarn=issues.some(x=>x.sev==='warn');
    const incompatBorder=hasError?'border-color:#c4321f;':'';
    const incompatBg=hasError?'background:rgba(196,50,31,0.04);':'';
    const warnHtml=issues.length&&!pk?`<div style="margin-top:7px;font-size:10px;color:${hasError?'#c4321f':'#9a6b15'};font-weight:600;line-height:1.4">${issues.map(x=>`⚠ ${x.msg}`).join('<br>')}</div>`:'';
    return`<div class="comp-card ${pk?'pk':''}" onclick="pick('${curCat}','${c.id}')" style="animation-delay:${i*0.04}s;${pk?'':incompatBorder+incompatBg}">
      <div style="display:flex;gap:12px">
        <img src="${c.img}" alt="${c.name}" loading="lazy" style="width:88px;height:72px;object-fit:contain;object-position:center;border-radius:8px;background:radial-gradient(circle,#dcdce2,#c4c4cc);border:1px solid var(--border);flex-shrink:0;padding:4px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04)">
        <div style="flex:1;min-width:0">
          <div class="comp-top" style="margin-bottom:6px">
            <div><div class="comp-name" style="${hasError&&!pk?'opacity:.7':''}">${c.name}</div><div class="comp-brand">${c.brand}</div><div style="margin-top:5px"><span class="tier-badge t${c.tier}">${c.tier}</span></div></div>
            <div class="comp-right"><div class="comp-price">$${c.price.toLocaleString()}</div>${pk?'<div style="font-size:10px;color:var(--accent);margin-top:3px;font-weight:600">✓ Selected</div>':''}</div>
          </div>
          <div class="spec-pills">${c.specs.map(s=>`<span class="spec-pill ${pk?'sel-pill':''}">${s}</span>`).join('')}</div>
          ${warnHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

            '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M20.153 8.304A7.344 7.344 0 0 0 13 2C9.243 2 6.097 4.611 5.202 8.152A5.002 5.002 0 0 0 7 18h13a5 5 0 0 0 .153-9.696z"/></svg> Amazon'+

      '</div>'+
      '<div class="sum-empty-label">Add '+c.label+'</div>'+
      '<span class="sum-add-btn">Select →</span>'+
    '</div>';
  }).join('');
  const partsHtml='<div class="sum-parts">'+rowsHtml+'</div>';

  let compatHtml='';
  if(cnt>=2){
    if(issues.length>0){
      const issueRows=issues.map(x=>{
        const col=x.sev==='error'?'#c4321f':'#9a6b15';
        const icon=x.sev==='error'?'✗':'!';
        return '<div style="display:flex;gap:8px;margin-bottom:6px;font-size:11.5px;line-height:1.45">'+
          '<span style="color:'+col+';font-weight:700;flex-shrink:0">'+icon+'</span>'+
          '<span style="color:'+col+'">'+x.msg+'</span></div>';
      }).join('');
      compatHtml='<div class="sum-compat" style="border-color:rgba(196,50,31,0.3);background:rgba(196,50,31,0.04)">'+
        '<div style="font-size:10px;font-weight:700;letter-spacing:.8px;color:#c4321f;margin-bottom:8px">COMPATIBILITY ISSUES</div>'+
        issueRows+'</div>';
    } else {
      compatHtml='<div class="sum-compat" style="border-color:rgba(28,125,77,0.25);background:rgba(28,125,77,0.05)">'+
        '<div style="font-size:12px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:7px">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'+
          ' All components compatible — physically and electrically verified</div></div>';
    }
  }

  const buyAllHtml=cnt>=4
    ?'<div class="sum-buy-all">'+
        '<div>'+
          '<div style="font-size:11px;font-weight:600;opacity:.55;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px">Total Build Cost</div>'+
          '<div class="sum-buy-all-price">$'+total.toLocaleString()+'</div>'+
          '<div class="sum-buy-all-sub">Opens '+cnt+' Amazon tabs · tag: '+AMZN_TAG+'</div>'+
        '</div>'+
        '<button class="sum-buy-all-btn" onclick="openAllLinks()">Buy All Parts on Amazon →</button>'+
      '</div>'
    :'';

  document.getElementById('build-summary').innerHTML=headerHtml+partsHtml+compatHtml+buyAllHtml;
}

function openAllLinks(){
  Object.values(picks).forEach((p,i)=>setTimeout(()=>window.open(p.buy,'_blank'),i*200));
}

function renderAll(){
  renderTabs();renderList();renderBuildSummary();
  const cnt=Object.keys(picks).length,total=Object.values(picks).reduce((s,p)=>s+p.price,0);
  document.getElementById('total-price').textContent=`$${total.toLocaleString()}`;
  const issues=checkCompat();
  const errors=issues.filter(x=>x.sev==='error');
  const warns=issues.filter(x=>x.sev==='warn');
  const btn=document.getElementById('btn-bench');btn.disabled=cnt<8||errors.length>0;
  document.getElementById('parts-label').textContent=`${cnt} of 8 components selected`;
  const pips=document.getElementById('parts-pips');
  pips.innerHTML=CATS.map(c=>`<div class="parts-pip" style="background:${picks[c.id]?'var(--accent)':'var(--border-hover)'}"></div>`).join('');
  const cs=document.getElementById('compat-strip');
  if(cnt>=2&&issues.length>0){
    cs.style.display='';
    cs.innerHTML=issues.map(x=>`<div style="display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11px;flex-shrink:0;color:${x.sev==='error'?'#c4321f':'#9a6b15'}">${x.sev==='error'?'✗':'!'}</span>
      <span style="font-size:11px;color:${x.sev==='error'?'#c4321f':'#9a6b15'};font-weight:500;line-height:1.4">${x.msg}</span>
    </div>`).join('')+`<div style="font-size:10px;color:var(--text-dim);padding-top:5px">${errors.length} conflict${errors.length!==1?'s':''} · ${warns.length} warning${warns.length!==1?'s':''}</div>`;
  } else if(cnt>=2){
    cs.style.display='';
    cs.innerHTML=`<div style="font-size:11px;color:var(--green);font-weight:600">✓ All components compatible</div>`;
  } else { cs.style.display='none'; }
  if(cnt>=8&&errors.length===0){document.getElementById('compat-badge').style.display='';document.getElementById('hdr-order-btn').style.display='';}
  else{document.getElementById('compat-badge').style.display='none';document.getElementById('hdr-order-btn').style.display='none';}
}
function showBench(){
  document.getElementById('build-panel').style.display='none';
  document.getElementById('perf-page').style.display='flex';
  document.getElementById('step1').classList.remove('active');document.getElementById('step1').classList.add('done');
  document.getElementById('step2').classList.add('active');
  const sc=getScore(),t=tierOf(sc);
  const el=document.getElementById('perf-big-num');
  let n=0;const iv=setInterval(()=>{n=Math.min(n+Math.ceil(sc/18),sc);el.textContent=n;if(n>=sc)clearInterval(iv);},30);
  document.getElementById('perf-tier-tag').innerHTML=`<span class="perf-tier-tag" style="background:${t.bg};color:${t.c};border:1px solid ${t.border}">${t.l}</span>`;
  const gpu=picks.gpu,cpu=picks.cpu;
  document.getElementById('perf-stat-row').innerHTML=[
    {l:'GPU',v:gpu.name.replace('NVIDIA ','').replace('AMD ','')},
    {l:'CPU',v:cpu.name.replace('AMD ','').replace('Intel ','')},
    {l:'VRAM',v:gpu.specs[0]},
    {l:'4K Ready',v:gpuScore>=78?'Yes ✓':'Limited'},
    {l:'Ray Tracing',v:gpuScore>=72?'Full RT ✓':'Partial'},
  ].map(s=>`<div class="perf-stat"><div class="perf-stat-label">${s.l}</div><div class="perf-stat-val">${s.v}</div></div>`).join('');
  renderGameGrid();
}
function hideBench(){
  document.getElementById('build-panel').style.display='flex';
  document.getElementById('perf-page').style.display='none';
  document.getElementById('step1').classList.add('active');document.getElementById('step1').classList.remove('done');
  document.getElementById('step2').classList.remove('active');
}
function sendToOrder(){alert('Opening FORGE order portal — Taiwan production lead time: 7–10 business days');}
function renderGameGrid(){
  document.getElementById('game-grid').innerHTML=GAMES.map((g,i)=>{
    const f1=fpsOf(g,'1080p'),f2=fpsOf(g,'1440p'),f4=fpsOf(g,'4K');
    const s2=fpsStyle(f2);
    return`<div class="game-card">
      <canvas class="game-banner" id="gbv${i}" width="600" height="260"></canvas>
      <div class="game-body">
        <div class="game-name">${g.name}</div>
        <div class="game-genre">${g.genre}</div>
        <div class="game-fps-row">
          ${[['1080P',f1],['1440P',f2],['4K',f4]].map(([r,fps])=>{const s=fpsStyle(fps);return`<div class="game-fps-item"><div class="game-fps-res">${r}</div><div class="game-fps-num" style="color:${s.color}">${fps}</div><div class="game-fps-label" style="color:${s.color};opacity:.7">${s.label}</div></div>`}).join('')}
        </div>
        <div class="game-rating" style="margin-top:8px">
          <span class="rating-pill" style="background:rgba(179,67,28,0.10);color:${s2.color};border:1px solid rgba(179,67,28,0.25)">${s2.label} at 1440p · ${f2} FPS</span>
        </div>
      </div>
    </div>`;
  }).join('');
  GAMES.forEach((g,i)=>{
    const cv=document.getElementById('gbv'+i);if(!cv)return;
    const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;let t=0;
    const pts=Array.from({length:20},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1,r:Math.random()*2.5+1}));
    (function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle=g.c1;ctx.fillRect(0,0,W,H);
      ctx.fillStyle=g.c2;ctx.globalAlpha=0.3;
      for(let j=0;j<5;j++){const x=((j*W/4+t*0.4*(j%2?1:-1))%W+W)%W;ctx.fillRect(x,0,W/8,H);}
      ctx.globalAlpha=1;
      ctx.strokeStyle=g.c3;ctx.lineWidth=1;ctx.globalAlpha=0.4;
      ctx.beginPath();for(let x=0;x<W;x+=2)ctx.lineTo(x,H*.6+Math.sin((x+t)*.04)*20+Math.cos((x+t)*.015)*28);ctx.stroke();
      ctx.globalAlpha=1;
      for(let y=0;y<H;y+=5){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,y,W,2);}
      pts.forEach(p=>{p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=g.c3;ctx.globalAlpha=0.55;ctx.fill();ctx.globalAlpha=1;});
      const fps=fpsOf(g,'1440p');
      ctx.font='bold 13px monospace';ctx.fillStyle=g.c3;ctx.globalAlpha=.9;ctx.fillText(fps+' FPS',W-72,18);ctx.fillText('1440p',W-60,34);
      ctx.globalAlpha=1;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H-26,W,26);
      ctx.font='9px monospace';ctx.fillStyle=g.c3;ctx.globalAlpha=0.8;ctx.fillText('MAX SETTINGS · RAY TRACING ULTRA · AI UPSCALING ON',10,H-9);
      ctx.globalAlpha=1;t++;requestAnimationFrame(draw);
    })();
  });
  }

renderAll();
</script>
